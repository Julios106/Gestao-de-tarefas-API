openapi: 3.0.0
info:
  title: API de Tarefas
  version: 1.0.0

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:

  /api/user/register:
    post:
      tags:
        - User
      summary: Registar novo user 
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nome
                - email
                - senha
              properties:
                nome:
                  type: string
                  example: Carlos
                email:
                  type: string
                  example: carlos@gmail.com
                senha:
                  type: string
                  example: 123456       
      responses:
        200:
          description: Sucesso

  /api/login:
    post:
      tags:
        - User
      summary: Login do usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - senha
              properties:
                email:
                  type: string
                  example: carlos@gmail.com
                senha:
                  type: string
                  example: 123456       
      responses:
        200:
          description: Login feito

  /api/perfil:
    get:
      tags:
        - User
      summary: Perfil do user
      security:
        - bearerAuth: []      
      responses:
        200:
          description: Login feito




  /api/listar:
    get:
      tags:
        - User
      summary: Listar todos os Users do DB
      responses:
        200:
          description: Sucesso


  /api/user/atualizar:
    put:
      tags:
        - User
      summary: Atualizar User 
      security:
        - bearerAuth: []      
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                  example: Carlos
                email:
                  type: string
                  example: carlitos@gmail.com       
      responses:
        200:
          description: Sucesso


  /api/user/atualizar-senha:
    put:
      tags:
        - User
      summary: Atualizar senha
      security:
      - bearerAuth: []    
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - senha_antiga
                - nova_senha
              properties:
                email:
                  type: string
                  example: Carlitos@gmail.com
                senha_antiga:
                  type: string
                  example: tua_senha_antiga
                nova_senha: 
                  type: string
                  example: tua_senha_nova                       
      responses:
        200:
          description: Sucesso
          
  /api/user/delete:
    delete:
      tags:
        - User
      summary: Deletar user e as respectivas tarefas
      security:
      - bearerAuth: []    
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - senha
              properties:
                senha:
                  type: string
                  example: sua_senha                     
      responses:
        200:
          description: Sucesso          


  /api/nova-task:
    post:
      tags:
        - Task
      summary: Adicionar Tarefas
      security:
      - bearerAuth: []    
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - titulo
                - descricao
              properties:
                titulo:
                  type: string
                  example: seu_titulo
                descricao:
                  type: string
                  example: sua_descricao                       
      responses:
        200:
          description: Sucesso              


  /api/user/tarefas:
    get:
      tags:
        - Task
      summary: Mostrar Tarefas ao User
      security:
      - bearerAuth: []                         
      responses:
        200:
          description: Sucesso              


  /api/listar-tarefas:
    get:
      tags:
        - Task
      summary: Listar todas tarefas do DB
      security:
      - bearerAuth: []                         
      responses:
        200:
          description: Sucesso 

  /api/tarefa-atualizar/{id}:
    put:
      tags:
        - Task
      summary: Alternar status da tarefa (pendente/feito)
      security:
      - bearerAuth: []        
      parameters:
        - name: id
          in: path
          required: true
          description: ID da tarefa
          schema:
            type: string
      responses:
        200:
          description: Status alterado com sucesso          


  /api/tarefa-atualizar-dados/{id}:
    put:
      tags:
        - Task
      summary: Atualizar dados da tarefa
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID da tarefa
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                titulo:
                  type: string
                  example: Estudar Node
                descricao:
                  type: string
                  example: Estudar Swagger
                status:
                  type: string
                  enum: [pendente, feito]
                  example: pendente
      responses:
        200:
          description: Tarefa atualizada com sucesso






  /api/deletar-tarefa/{id}:
    delete:
      tags:
        - Task
      summary: Deletar tarefa (tem que estar logado)
      security:
      - bearerAuth: []        
      parameters:
        - name: id
          in: path
          required: true
          description: ID da tarefa
          schema:
            type: string
      responses:
        200:
          description: Tarefa deletada com sucesso     